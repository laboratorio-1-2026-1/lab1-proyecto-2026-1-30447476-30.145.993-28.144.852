version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: smartgym_db
    environment:
      POSTGRES_USER: smartgym
      POSTGRES_PASSWORD: smartgym123
      POSTGRES_DB: smartgym_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartgym -d smartgym_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: smartgym_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smartgym:smartgym123@db:5432/smartgym_db
      SECRET_KEY: supersecretkey_change_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: